name: Parcel Lookup

# Triggers when an issue is opened or edited with a title starting "lookup:"
# or when manually run from the Actions tab with a parcel ID input.
on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      parcel_id:
        description: "Tooele County parcel ID (e.g. 01-440-0-0019)"
        required: true

permissions:
  issues: write
  contents: read

jobs:
  lookup:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, 'lookup:') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests pyyaml

      - name: Determine parcel ID
        id: parcel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "id=${{ github.event.inputs.parcel_id }}" >> $GITHUB_OUTPUT
          else
            # Strip leading "lookup:" and whitespace from issue title
            id=$(echo "${{ github.event.issue.title }}" | sed -e 's/^lookup://' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            echo "id=$id" >> $GITHUB_OUTPUT
          fi

      - name: Run lookup
        id: run
        run: |
          cd scripts
          python lookup_parcel.py "${{ steps.parcel.outputs.id }}" > /tmp/report.md
          # Capture the report for the next step
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/report.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment on issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: parcel-report
          path: /tmp/report.md
