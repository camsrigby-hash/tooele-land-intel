name: Geocode agenda items

on:
  workflow_run:
    workflows: ["Weekly LLM Enrichment & Digest"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  geocode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Geocode agenda items
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/geocode_items.py

      - name: Commit geocoded data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/items_geocoded.csv data/api_costs.csv data/cache/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Geocode: $(date -u +%Y-%m-%d)"
            git push
          fi
