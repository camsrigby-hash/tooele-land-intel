name: Build gap layer + STIP

on:
  schedule:
    # First of every month at 09:00 UTC. Heavier than agendas (UGRC + GP +
    # parcel polygon fetch), so monthly cadence is plenty for a layer driven
    # by zoning ordinances and General Plan amendments.
    - cron: "0 9 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests shapely PyYAML

      - name: Fetch STIP projects (Tooele Valley)
        run: python scripts/fetch_stip.py

      - name: Build gap layer (Erda + Grantsville)
        run: python scripts/build_gap_layer.py --max 6000

      - name: Enrich road adjacency
        run: python scripts/enrich_roads.py

      - name: Commit data updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gap_layer.geojson data/stip_projects.geojson data/roads_enrichment.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: refresh gap_layer + STIP $(date -u +%F)"
            git push
          fi
