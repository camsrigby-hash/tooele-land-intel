name: Agendas Watch

on:
  schedule:
    # Mondays 13:00 UTC = 6am Mountain (winter), 7am MDT (summer). Close enough.
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests pyyaml beautifulsoup4 pypdf

      - name: Run scraper
        run: |
          cd ${{ github.workspace }}
          python scripts/scrape_agendas.py

      - name: Commit any new rows
        run: |
          git config user.name  "tooele-land-intel-bot"
          git config user.email "actions@github.com"
          git add data/agenda_items.csv data/seen_pdfs.txt
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "agendas: weekly scrape $(date -u +%F)"
            git push
          fi
