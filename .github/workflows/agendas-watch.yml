name: Weekly Agenda Scrape

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape Grantsville website
        run: |
          mkdir -p data/agendas
          python scripts/scrape_agendas.py \
            --jurisdiction grantsville \
            --output data/agendas/web_grantsville_$(date +%Y%m%d).json
        continue-on-error: true

      - name: Scrape Utah PMN bodies
        run: python scripts/scrape_pmn_all.py
        continue-on-error: true

      - name: Persist to CSV
        run: python scripts/persist_to_csv.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/agenda_items.csv data/agendas/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly scrape: $(date -u +%Y-%m-%d)"
            git push
          fi
