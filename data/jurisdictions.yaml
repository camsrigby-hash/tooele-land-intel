arcgis_base: "https://tcgisws.tooeleco.gov/server/rest/services"

# Parcel layer - field names verified against live API on 2026-04-20
parcels:
  url: "{arcgis_base}/Parcels/MapServer/0"
  fields:
    parcel_id: "Parcel_ID"
    owner: "PrimaryOwnerName"
    all_owners: "AllOwners"
    acres_tax: "TotalAcres"
    acres_geo: "AcresGeo"
    situs_address: "SitusAddress"
    mail_address: "MailToAddress"
    area_name: "AreaName"
    section_twp_range: "SectionTownshipRange"
    total_market: "TotalMarket"
    property_codes: "PropertyCodes"
    subdivision: "Subdivision"
    year_built: "YEARBUILT"

# Zoning layers - each jurisdiction has its own layer
# NOTE (2026-04-20): the zoning layers contain a "LanduseCode" field, but in
# practice every row stores the same Google Doc URL pointing at the Erda land
# use code reference document - it's a link, not a code. We intentionally do
# not map it here. The "Ord_Link" field (alias "County Landuse Code") is
# similarly inconsistent. Stick with Zone / Descript for actual zoning info.
zoning:
  url: "{arcgis_base}/Zoning/MapServer"
  fields:
    zone_code: "Zone"
    description: "Descript"
    label: "Label"
    jurisdiction: "Jurisdiction"
    ordinance: "Ordinance"
  layers:
    erda: 1
    lake_point: 2
    municipal: 3           # Tooele City and other municipalities
    unincorporated: 4      # Tooele County unincorporated
    grantsville: 7

# Future land use / 2022 Tooele County General Plan
# Verified 2026-04-20: layer is titled "2022 Tooele County GP: Planned Land Use"
# and covers much of the Tooele Valley (lon -112.56 to -112.17, lat 40.33 to 40.72),
# including parts of the Erda footprint. Coverage is patchy though - many parcels
# fall in unassigned holes between polygons. The lookup script does a strict
# point-in-polygon first and falls back to a radius search if the centroid is
# uncategorized. Erda and Grantsville do not yet publish their own GP as GIS.
general_plan:
  url: "{arcgis_base}/GeneralPlan_2022_LandUseCA/MapServer/0"
  coverage: "2022 Tooele County GP - Tooele Valley, partial/patchy"
  fallback_radius_m: 250
  fields:
    landuse_code: "Landuse_Ca"
    name: "Name"
    notes: "Notes"

# Jurisdiction / municipality boundaries
municipalities:
  url: "{arcgis_base}/Municipalities/MapServer"
  layers:
    incorporated: 0
    unincorporated: 1

jurisdictions:
  tooele_county:
    name: "Tooele County (Unincorporated)"
    zoning_layer: 4
    # Agendas are in Tyler Meeting Manager (JavaScript SPA) - not directly scrapable.
    # The scraper fetches the planning page and filters for keyword-relevant PDF links.
    agenda_url: "https://www.tooeleco.org/260/Planning-Commission"
    council_url: "https://www.tooeleco.org/143/Commission-Meetings"
    scraper_type: "tooele_county"

  grantsville:
    name: "Grantsville City"
    zoning_layer: 7
    # Correct domain is grantsvilleut.gov - grantsvillecity.org times out.
    # PDFs are in a date-organized table with direct href links.
    agenda_url: "https://www.grantsvilleut.gov/government/city_council.php"
    planning_url: "https://www.grantsvilleut.gov/departments/community___economic_development/planning_commission.php"
    scraper_type: "grantsvilleut"

  erda:
    name: "Erda City"
    zoning_layer: 1
    # Erda website (Squarespace) has no agenda pages as of 2026-04.
    # Incorporated 2021, still building out public records infrastructure.
    agenda_url: null
    planning_url: null
    scraper_type: "unavailable"
